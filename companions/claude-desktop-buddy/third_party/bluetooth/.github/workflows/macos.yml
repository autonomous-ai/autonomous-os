name: macOS

on:
  pull_request:
  push:
    branches:
      - dev
      - release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-14:
    name: macos-14
    runs-on: macos-14
    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run unit tests
        run: go test
      - name: "Run macOS smoke tests"
        run: make smoketest-macos
  
  macos-15:
    name: macos-15
    runs-on: macos-15
    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run unit tests
        run: go test
      - name: "Run macOS smoke tests"
        run: make smoketest-macos
