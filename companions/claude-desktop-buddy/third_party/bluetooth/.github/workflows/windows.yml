name: Windows

on:
  pull_request:
  push:
    branches:
      - dev
      - release

jobs:
  build-windows:
    name: build-windows
    runs-on: windows-2022
    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run unit tests
        run: go test
      - name: "Run Windows smoke tests"
        run: make smoketest-windows
